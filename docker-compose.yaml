services:
  litellm:
    image: ghcr.io/berriai/litellm:latest
    volumes:
      - ./generated/litellm-config.yaml:/config/config.yaml
      - ./workspace:/workspace:ro
      - ./src/agent_platform/callbacks:/callbacks:ro
    ports:
      - "4000:4000"
    command: ["--config", "/config/config.yaml"]
    environment:
      - PYTHONPATH=/callbacks
      - WORKSPACE_DIR=/workspace
    restart: unless-stopped

  signal-adapter:
    build:
      context: .
      dockerfile: src/adapters/signal/Dockerfile
    volumes:
      - ./workspace:/workspace
      - ./sessions:/sessions
      - ./agent.yaml:/app/agent.yaml:ro
    environment:
      - LITELLM_URL=http://litellm:4000
      - AGENT_CONFIG=/app/agent.yaml
      - CHANNEL_MCP_PORT=8100
    ports:
      - "8100:8100"
    depends_on: [litellm, signal-cli]
    restart: unless-stopped

  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    volumes:
      - signal-data:/home/.local/share/signal-cli
    ports:
      - "8080:8080"
    environment:
      - MODE=json-rpc
    restart: unless-stopped

  workspace-fs-mcp:
    build:
      context: ./src/mcp_servers/workspace_fs
      dockerfile: Dockerfile
    volumes:
      - ./workspace:/workspace
    environment:
      - WORKSPACE_DIR=/workspace
    restart: unless-stopped

volumes:
  signal-data:
