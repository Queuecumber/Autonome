[project]
name = "agent-platform"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.0",
    "litellm @ git+https://github.com/Queuecumber/litellm.git",  # fork with MCP tool discovery fix
    "httpx>=0.27",
    "pyyaml>=6",
    "uvicorn>=0.30",
    "starlette>=0.40",
]

[project.scripts]
agent-platform-config = "agent_platform.config:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.30",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_platform", "src/adapters", "src/session_manager", "src/mcp_servers"]
